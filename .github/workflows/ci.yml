name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Test
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for app
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:37617/api/session; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs app
          exit 1

      - name: Show compose status
        if: always()
        run: docker compose ps

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop stack
        if: always()
        run: docker compose down -v

  tag-metadata:
    name: Tag metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate tag format
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like vMAJOR.MINOR.PATCH, got: $tag"
            exit 1
          fi

      - name: Validate changelog entry
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! grep -Eq "^## ${version} - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a release heading for ${version}"
            exit 1
          fi
