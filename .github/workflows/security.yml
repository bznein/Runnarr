name: Security advisory

on:
  schedule:
    - cron: "24 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Audit dependencies
        run: npm audit --audit-level=high

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  container:
    name: Container scan and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build image
        run: docker build --tag runnarr:security .

      - name: Scan image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: runnarr:security
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.17.7
        with:
          image: runnarr:security
          artifact-name: runnarr-sbom.spdx.json
          output-file: runnarr-sbom.spdx.json
