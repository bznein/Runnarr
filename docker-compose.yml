services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runnarr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runnarr}
      POSTGRES_DB: ${POSTGRES_DB:-runnarr}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - runnarr

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://runnarr:runnarr@db:5432/runnarr?sslmode=disable}
      RUNNARR_HTTP_ADDR: ${RUNNARR_HTTP_ADDR:-:8080}
      RUNNARR_BASE_URL: ${RUNNARR_BASE_URL:-http://localhost:37617}
      RUNNARR_ADMIN_PASSWORD: ${RUNNARR_ADMIN_PASSWORD:-change-me}
      RUNNARR_ADMIN_PASSWORD_HASH: ${RUNNARR_ADMIN_PASSWORD_HASH:-}
      RUNNARR_SECRET_KEY: ${RUNNARR_SECRET_KEY:-change-this-to-a-long-random-secret-with-at-least-32-bytes}
      MAP_TILE_URL: ${MAP_TILE_URL:-https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png}
    ports:
      - "${RUNNARR_PORT:-37617}:8080"
    networks:
      - runnarr

volumes:
  postgres-data:

networks:
  runnarr:
    ipam:
      config:
        - subnet: 10.89.0.0/24
